name: demo-regression

# Plays the in-repo shareware doom1.wad demos headless and compares a per-tic
# gameplay fingerprint to committed golden hashes. Guards against
# gameplay/physics/RNG changes that break demo determinism.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  demo-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 build deps
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build room4doom (release)
        run: cargo build --release -p room4doom

      - name: Demo determinism regression
        run: bash tools/demo-regression.sh
