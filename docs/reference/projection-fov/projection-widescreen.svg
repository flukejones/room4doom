<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="600" height="260" font-family="monospace" font-size="11">
  <!-- Ultrawide 534x200 (aspect 2.67:1) -->
  <rect x="33" y="10" width="534" height="200" rx="3" fill="#f8f0f0" stroke="#cc9999" stroke-width="2"/>

  <!-- Widescreen 382x200 (aspect 1.91:1), centered in ultra -->
  <rect x="109" y="10" width="382" height="200" rx="3" fill="#f0f0f8" stroke="#9999cc" stroke-width="2"/>

  <!-- OG 320x200 (aspect 1.6:1), centered in wide -->
  <rect x="140" y="10" width="320" height="200" rx="3" fill="#e8f4e8" stroke="#66aa66" stroke-width="2"/>

  <!-- Center line -->
  <line x1="300" y1="10" x2="300" y2="210" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Eye point -->
  <circle cx="300" cy="240" r="4" fill="#333"/>
  <text x="312" y="244" font-size="10" fill="#333">Eye (focal=160)</text>

  <!-- Rays to OG edges -->
  <line x1="300" y1="240" x2="140" y2="210" stroke="#66aa66" stroke-width="1" opacity="0.6"/>
  <line x1="300" y1="240" x2="460" y2="210" stroke="#66aa66" stroke-width="1" opacity="0.6"/>

  <!-- Rays to widescreen edges -->
  <line x1="300" y1="240" x2="109" y2="210" stroke="#9999cc" stroke-width="1" opacity="0.6"/>
  <line x1="300" y1="240" x2="491" y2="210" stroke="#9999cc" stroke-width="1" opacity="0.6"/>

  <!-- Rays to ultrawide edges -->
  <line x1="300" y1="240" x2="33" y2="210" stroke="#cc9999" stroke-width="1" opacity="0.6"/>
  <line x1="300" y1="240" x2="567" y2="210" stroke="#cc9999" stroke-width="1" opacity="0.6"/>

  <!-- OG label -->
  <text x="300" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#336633">320x200</text>
  <text x="300" y="105" text-anchor="middle" font-size="10" fill="#336633">OG Doom</text>
  <text x="300" y="120" text-anchor="middle" font-size="9" fill="#336633">hfov=90.0  vfov=64.0</text>

  <!-- Widescreen labels (in the side margins) -->
  <text x="122" y="105" text-anchor="middle" font-size="9" fill="#333399" transform="rotate(-90,122,105)">+31px</text>
  <text x="478" y="105" text-anchor="middle" font-size="9" fill="#333399" transform="rotate(90,478,105)">+31px</text>
  <text x="300" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="#333399">382x200 Widescreen</text>
  <text x="300" y="168" text-anchor="middle" font-size="9" fill="#333399">hfov=100.1  vfov=64.0</text>

  <!-- Ultrawide labels (in the outer margins) -->
  <text x="70" y="105" text-anchor="middle" font-size="9" fill="#993333" transform="rotate(-90,70,105)">+107px</text>
  <text x="530" y="105" text-anchor="middle" font-size="9" fill="#993333" transform="rotate(90,530,105)">+107px</text>
  <text x="300" y="190" text-anchor="middle" font-size="10" font-weight="bold" fill="#993333">534x200 Ultrawide</text>
  <text x="300" y="203" text-anchor="middle" font-size="9" fill="#993333">hfov=118.2  vfov=64.0</text>
</svg>
