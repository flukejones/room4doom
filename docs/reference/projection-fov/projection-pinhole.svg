<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" font-family="monospace" font-size="10">
  <!-- Screen plane -->
  <rect x="60" y="10" width="280" height="20" rx="2" fill="#e8e8e8" stroke="#666" stroke-width="1.5"/>
  <text x="200" y="24" text-anchor="middle" font-size="9" fill="#333">Screen plane (buffer width)</text>

  <!-- Center line from screen to eye -->
  <line x1="200" y1="30" x2="200" y2="180" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- C label -->
  <text x="207" y="44" font-size="10" font-weight="bold" fill="#333">C</text>

  <!-- half_w labels -->
  <line x1="65" y1="42" x2="195" y2="42" stroke="#0066cc" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="130" y="55" text-anchor="middle" font-size="9" fill="#0066cc">half_w</text>
  <line x1="205" y1="42" x2="335" y2="42" stroke="#0066cc" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="270" y="55" text-anchor="middle" font-size="9" fill="#0066cc">half_w</text>

  <!-- focal_length label -->
  <text x="210" y="110" font-size="9" fill="#cc6600">focal_length</text>

  <!-- Eye point -->
  <circle cx="200" cy="180" r="5" fill="#333"/>
  <text x="212" y="184" font-size="11" font-weight="bold" fill="#333">Eye</text>

  <!-- Rays to edges -->
  <line x1="200" y1="180" x2="60" y2="20" stroke="#cc0000" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="180" x2="340" y2="20" stroke="#cc0000" stroke-width="1" opacity="0.5"/>

  <!-- Angle arc -->
  <path d="M 200,150 Q 185,145 178,138" fill="none" stroke="#cc0000" stroke-width="1"/>
  <text x="160" y="148" font-size="9" fill="#cc0000">half_angle</text>

  <!-- Formula -->
  <text x="200" y="208" text-anchor="middle" font-size="10" fill="#333">hfov = 2 * atan(half_w / focal_length)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="4" refX="3" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#0066cc" stroke="none"/>
    </marker>
  </defs>
</svg>
